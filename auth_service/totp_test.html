<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TOTP MFA Test</title>
  <style>
    :root {
      --primary: #13294b;
      --bg: #ffffff;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); }
    .container { max-width: 560px; margin: 40px auto; padding: 0 16px; }
    h1 { margin: 0 0 8px; font-size: 28px; color: #0f172a; text-align: center; }
    p.sub { margin: 0 0 24px; color: var(--muted); text-align: center; }

    label { display: block; font-weight: 600; margin: 16px 0 8px; color: #111827; }
    input { width: 100%; padding: 14px 12px; border-radius: 10px; border: 1px solid var(--border); background: #f6f7fb; font-size: 15px; }
    input::placeholder { color: #94a3b8; }

    .btn { width: 100%; padding: 14px 16px; border: 0; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 15px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-ghost { background: #f3f4f6; color: #111827; }

    .row { display: flex; gap: 8px; }
    .row > .btn { flex: 1; }

    .panel { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 16px; background: #fff; }
    .muted { color: var(--muted); }

    .qr-wrap { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: start; }
    .qr-box { width: 220px; height: 220px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 10px; background: #fff; }
    .kv { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; }
    .kv div { margin: 6px 0; }

    .response { margin-top: 24px; border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: #0b1021; color: #e6e6e6; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; overflow: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TOTP MFA Test</h1>
    <p class="sub">Use email or mobile (e.g., user@example.com or +919876543210)</p>

    <label for="identifier">Identifier</label>
    <input id="identifier" placeholder="user@example.com or +919876543210" />

    <div class="row" style="margin-top: 12px;">
      <button class="btn btn-primary" onclick="setupStart()">Start TOTP Setup</button>
      <button class="btn btn-ghost" onclick="clearPanel()">Clear</button>
    </div>

    <div id="setup-panel" class="panel" style="display:none;">
      <h3 style="margin:0 0 8px;">Scan QR in your Authenticator</h3>
      <div class="qr-wrap">
        <div class="qr-box">
          <img id="qr" alt="QR Code" style="max-width:100%; max-height:100%;" />
        </div>
        <div>
          <div class="kv"><div><strong>Secret:</strong> <span id="secret"></span></div></div>
          <div class="kv"><div><strong>otpauth URL:</strong> <a id="otpauth" href="#" target="_blank" rel="noopener noreferrer">open</a></div></div>
          <p class="muted">If QR fails, add your account in the authenticator using the secret manually.</p>
        </div>
      </div>

      <label for="code" style="margin-top:16px;">Enter 6-digit code</label>
      <input id="code" inputmode="numeric" pattern="\\d{6}" placeholder="123456" />
      <div class="row" style="margin-top: 12px;">
        <button class="btn btn-primary" onclick="verifyTotp()">Verify TOTP</button>
      </div>
    </div>

    <div class="response" id="out">(waiting)</div>
  </div>

  <script>
    // ====== Config ======
    const API_BASE = 'http://localhost:8001';

    // ====== Helpers ======
    const $ = (id) => document.getElementById(id);
    const outEl = $('out');
    function setOut(obj) {
      outEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }

    function clearPanel() {
      $('identifier').value = '';
      $('code').value = '';
      $('setup-panel').style.display = 'none';
      $('qr').src = '';
      $('secret').textContent = '';
      $('otpauth').href = '#';
      setOut('(cleared)');
    }

    // ====== API Calls ======
    async function setupStart() {
      const identifier = $('identifier').value.trim();
      if (!identifier) { setOut('Enter an identifier first.'); return; }
      try {
        const res = await fetch(`${API_BASE}/auth/mfa/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier })
        });
        const data = await res.json();
        setOut({ status: res.status, data });
        if (!res.ok) return;

        const { otpauth_url, secret } = data;
        // Render QR via public QR generator
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(otpauth_url)}`;
        $('qr').src = qrUrl;
        $('secret').textContent = secret;
        $('otpauth').href = otpauth_url;
        $('setup-panel').style.display = '';
      } catch (e) {
        setOut({ error: e?.message || String(e) });
      }
    }

    async function verifyTotp() {
      const identifier = $('identifier').value.trim();
      const code = $('code').value.trim();
      if (!identifier || !code) { setOut('Provide identifier and 6-digit code.'); return; }
      if (!/^\d{6}$/.test(code)) { setOut('Code must be 6 digits.'); return; }
      try {
        const res = await fetch(`${API_BASE}/auth/mfa/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, code })
        });
        const data = await res.json();
        setOut({ status: res.status, data });
        // Save access token if present
        const token = data?.data?.access_token;
        if (res.ok && token) {
          try { localStorage.setItem('access_token', token); } catch {}
        }
      } catch (e) {
        setOut({ error: e?.message || String(e) });
      }
    }
  </script>
</body>
</html>
